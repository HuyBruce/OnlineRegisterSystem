# ===================================================================
# OnlineRegisterSystem - DEV Profile Configuration
# ===================================================================
# Copy this file and rename to application-local.properties for
# your personal credentials (application-local.properties is gitignored)

# -------------------------------------------------------------------
# Supabase PostgreSQL Database (Transaction Pooler)
# -------------------------------------------------------------------
# Get these values from: Supabase Dashboard > Project Settings > Database > Connection string (JDBC)
spring.datasource.url=jdbc:postgresql://YOUR_SUPABASE_HOST:6543/postgres
spring.datasource.username=postgres.YOUR_SUPABASE_DB_USER
spring.datasource.password=YOUR_SUPABASE_DB_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

# -------------------------------------------------------------------
# JPA / Hibernate Configuration
# -------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# -------------------------------------------------------------------
# HikariCP Connection Pool (optimized for Supabase Pooler)
# -------------------------------------------------------------------
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# -------------------------------------------------------------------
# Logging
# -------------------------------------------------------------------
logging.level.root=INFO
logging.level.com.onlineregister=DEBUG
logging.level.org.springframework.security=DEBUG
